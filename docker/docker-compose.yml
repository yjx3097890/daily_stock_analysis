# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================
#
# 前置：cp .env.example .env 并填入 API Key 等配置
#
# 使用方式（任选其一）:
#   根目录: docker compose up -d
#   或指定: docker compose -f ./docker/docker-compose.yml up -d
#
# 服务:
#   Web/API:  docker compose up -d server      → http://localhost:8000
#   定时分析: docker compose up -d analyzer
#   全部启动: docker compose up -d

name: daily-stock-analysis

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      # PyPI 镜像只加速 PyPI 包；alphasift 仍从 GitHub 拉取。构建失败时取消注释并改端口：
      # HTTP_PROXY: http://host.docker.internal:7890
      # HTTPS_PROXY: http://host.docker.internal:7890
      # 或使用 GitHub 镜像源（示例，可用性因网络而异）：
      # ALPHASIFT_INSTALL_SPEC: git+https://gitclone.com/github.com/ZhuLinsen/alphasift.git@1a0ed8c99b3615c0cb1076e6029827ffc6de2344
  restart: unless-stopped

  # 环境变量（从 .env 文件加载）。不要将 ../.env 作为单文件 volume 挂载到 /app/.env，
  # 否则 Docker mount point 会阻止配置保存时的 os.replace 原子更新。
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    # Longbridge OAuth token cache persistence; entrypoint repairs container-side ownership for dsa user.
    # Create ../longbridge_tokens on the host before copying an authorized token cache into it.
    - ../longbridge_tokens:/home/dsa/.longbridge
    # 如需覆盖前端静态资源，可挂载本地 static 目录
    # - ../static:/app/static:ro

  environment:
    - TZ=Asia/Shanghai

    # Web/API service bind address (must be 0.0.0.0 inside container)
    - WEBUI_HOST=0.0.0.0
    # API_PORT 从 .env 文件读取，无需在此硬编码

    # 代理设置（如果需要）
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # 资源限制
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # 定时任务模式
  analyzer:
    <<: *common
    container_name: stock-analyzer

  # FastAPI 模式（WebUI + API）
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    # 若使用 network_mode: host，则以下 ports 映射无效，端口由 command 中的 --port 指定
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${API_PORT:-8000}/api/health || curl -fsS http://127.0.0.1:${API_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
